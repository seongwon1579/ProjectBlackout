<svg viewBox="0 0 1080 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <title id="t">Aim Offset와 True Impact Indicator — 장애물 가림 상황</title>
  <desc id="d">플레이어가 카메라 크로스헤어로 멀리 있는 목표를 조준하고 캐릭터가 Aim Offset으로 상체를 회전시켜 총구를 정렬하지만, 총구와 목표 사이에 장애물이 있어 실제 탄착은 장애물에 막힌다. True Impact Indicator가 그 실제 탄착 위치(장애물)를 표시한다.</desc>

  <defs>
    <marker id="aRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff463b"/>
    </marker>
    <marker id="aGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0aa"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1080" height="900" fill="#14141a"/>
  <rect x="0" y="0" width="8" height="900" fill="#ff463b"/>

  <!-- title -->
  <text x="44" y="56" fill="#f4f4f7" font-size="32" font-weight="700">Aim Offset &amp; True Impact Indicator</text>

  <!-- scene panel -->
  <rect x="40" y="86" width="1000" height="786" rx="14" fill="#1d1d26" stroke="#33333f" stroke-width="1.5"/>

  <!-- floor -->
  <line x1="70" y1="806" x2="1010" y2="806" stroke="#2c2c38" stroke-width="2"/>

  <!-- legend -->
  <g font-size="14.5">
    <line x1="636" y1="124" x2="678" y2="124" stroke="#9aa0aa" stroke-width="2.4" stroke-dasharray="8 6"/>
    <text x="686" y="129" fill="#c9cdd6">카메라 조준선</text>
    <line x1="636" y1="150" x2="678" y2="150" stroke="#ff463b" stroke-width="3"/>
    <text x="686" y="155" fill="#c9cdd6">실제 발사선 (총구)</text>
  </g>

  <!-- camera -->
  <g>
    <rect x="106" y="198" width="48" height="34" rx="5" fill="#2c2c38" stroke="#565666" stroke-width="1.5"/>
    <polygon points="154,206 154,224 176,233 176,197" fill="#2c2c38" stroke="#565666" stroke-width="1.5"/>
    <circle cx="130" cy="215" r="7" fill="#14141a" stroke="#9aa0aa" stroke-width="1.5"/>
    <text x="130" y="258" fill="#aeb3bf" font-size="15" text-anchor="middle">카메라</text>
  </g>

  <!-- spring arm -->
  <line x1="150" y1="226" x2="182" y2="432" stroke="#565666" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- character -->
  <g>
    <circle cx="185" cy="415" r="17" fill="#3a3a47" stroke="#6a6a7a" stroke-width="1.5"/>
    <rect x="167" y="432" width="36" height="58" rx="10" fill="#3a3a47" stroke="#6a6a7a" stroke-width="1.5"/>
    <line x1="203" y1="466" x2="262" y2="462" stroke="#d7d9df" stroke-width="6" stroke-linecap="round"/>
    <circle cx="263" cy="462" r="4" fill="#ff463b"/>
    <path d="M 161 422 A 27 27 0 0 1 210 414" fill="none" stroke="#ff463b" stroke-width="2.6" marker-end="url(#aRed)"/>
    <text x="150" y="556" fill="#ff7a72" font-size="15" font-weight="600" text-anchor="middle">Aim Offset</text>
    <text x="150" y="575" fill="#aeb3bf" font-size="13.5" text-anchor="middle">상체 회전</text>
    <line x1="172" y1="540" x2="184" y2="494" stroke="#565666" stroke-width="1.2" stroke-dasharray="3 3"/>
  </g>

  <!-- camera aim line (dashed, clears obstacle) -->
  <line x1="176" y1="212" x2="892" y2="340" stroke="#9aa0aa" stroke-width="2.4" stroke-dasharray="8 6" marker-end="url(#aGray)"/>

  <!-- muzzle fire line (solid red, blocked by obstacle) -->
  <line x1="263" y1="462" x2="552" y2="406" stroke="#ff463b" stroke-width="3" marker-end="url(#aRed)"/>
  <line x1="568" y1="404" x2="888" y2="344" stroke="#ff463b" stroke-width="2" stroke-dasharray="3 7" opacity="0.32"/>

  <!-- obstacle -->
  <g>
    <rect x="560" y="320" width="66" height="486" rx="4" fill="#2b2b34" stroke="#565666" stroke-width="1.5"/>
    <line x1="560" y1="430" x2="626" y2="430" stroke="#3c3c48" stroke-width="1.5"/>
    <line x1="560" y1="560" x2="626" y2="560" stroke="#3c3c48" stroke-width="1.5"/>
    <line x1="560" y1="690" x2="626" y2="690" stroke="#3c3c48" stroke-width="1.5"/>
    <text x="593" y="306" fill="#aeb3bf" font-size="15" text-anchor="middle">장애물 (엄폐물)</text>
  </g>

  <!-- target enemy -->
  <g>
    <ellipse cx="905" cy="812" rx="48" ry="9" fill="#000000" opacity="0.35"/>
    <circle cx="905" cy="340" r="16" fill="#33232a" stroke="#7a4a4f" stroke-width="1.5"/>
    <path d="M 883 360 L 927 360 L 940 472 L 870 472 Z" fill="#33232a" stroke="#7a4a4f" stroke-width="1.5"/>
    <text x="905" y="506" fill="#aeb3bf" font-size="15" text-anchor="middle">목표 (적 / 약점)</text>
  </g>

  <!-- camera target marker (hollow crosshair) on target -->
  <g stroke="#e6e8ed" stroke-width="2">
    <circle cx="905" cy="340" r="11" fill="none"/>
    <line x1="905" y1="325" x2="905" y2="355"/>
    <line x1="890" y1="340" x2="920" y2="340"/>
  </g>
  <text x="995" y="240" fill="#e6e8ed" font-size="15" font-weight="600" text-anchor="end">조준 목표</text>
  <text x="995" y="259" fill="#aeb3bf" font-size="13.5" text-anchor="end">(카메라 타겟)</text>
  <line x1="916" y1="334" x2="952" y2="256" stroke="#565666" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- true impact indicator (filled red ring) on obstacle -->
  <g>
    <circle cx="558" cy="405" r="13" fill="none" stroke="#ff463b" stroke-width="3.2"/>
    <circle cx="558" cy="405" r="3.4" fill="#ff463b"/>
  </g>
  <text x="300" y="606" fill="#ff7a72" font-size="16" font-weight="700">True Impact Indicator</text>
  <text x="300" y="628" fill="#aeb3bf" font-size="14" text-anchor="start">실제 탄착 — 장애물에 막힘</text>
  <line x1="547" y1="410" x2="436" y2="600" stroke="#565666" stroke-width="1.2" stroke-dasharray="3 3"/>
</svg>
