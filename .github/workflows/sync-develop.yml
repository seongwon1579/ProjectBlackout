# .github/workflows/sync-develop.yml
name: Sync main → develop

on:
  push:
    branches:
      - main

jobs:
  sync-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create sync PR
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 이미 동일한 sync PR이 열려 있으면 중복 생성 방지
          EXISTING=$(gh pr list --base develop --head main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "✅ 이미 sync PR이 열려 있습니다. (#$EXISTING)"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "Chore: main → develop 동기화" \
            --body "main 브랜치의 변경 사항을 develop에 반영하는 자동 생성 PR입니다."

          echo "✅ sync PR 생성 완료"
